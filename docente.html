<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITS Smart Management - Registrazione Ingresso/Uscita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        .dashboard-body {
            background: var(--bg-color);
            min-height: 100vh;
            padding: 0;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* Header */
        .dash-header {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem 2rem;
            margin-bottom: 1.25rem;
            box-shadow: var(--shadow-sm);
        }

        .dash-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .dash-logo {
            width: 48px;
            height: auto;
        }

        .dash-header h1 {
            font-size: 1.35rem;
            font-weight: 800;
            margin-bottom: 0.1rem;
        }

        .dash-header .subtitle {
            font-size: 0.85rem;
            margin-bottom: 0;
        }

        .status-badge {
            background: rgba(39, 174, 96, 0.06);
            border: 1px solid rgba(39, 174, 96, 0.15);
            color: var(--success);
        }

        /* Counters */
        .counters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .counter-card {
            flex: 1;
            background: white;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .counter-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .counter-card .counter-value {
            font-size: 2.25rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .counter-card .counter-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 0.4rem;
        }

        .counter-card.entrata .counter-value { color: var(--success); }
        .counter-card.uscita .counter-value { color: var(--warning); }
        .counter-card.totale .counter-value { color: var(--accent); }

        /* Cards */
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
        }

        .card h2 {
            color: var(--primary);
            border-bottom: 1px solid var(--bg-color);
            font-weight: 700;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 0;
            flex-shrink: 0;
        }

        .card-body {
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        /* Equal height cards */
        .dash-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: stretch;
        }

        .dash-main .card {
            height: 520px;
        }

        /* Scanner */
        .scanner-container {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
        }

        #reader { width: 100%; border: none !important; }

        #reader button {
            background: linear-gradient(135deg, var(--primary), var(--primary-light)) !important;
            color: white !important;
            border: none !important;
            padding: 0.75rem 1.5rem !important;
            border-radius: 10px !important;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        #reader button:hover {
            background: linear-gradient(135deg, var(--primary-hover), var(--primary)) !important;
        }

        #reader select {
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
            width: 100%;
            font-family: inherit;
        }

        #reader__dashboard_section_csr span {
            margin: 10px 0 !important;
            display: block;
        }

        /* Feedback */
        .feedback-area {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .scan-notification {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-left-width: 4px;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .scan-notification:hover {
            transform: translateX(3px);
            box-shadow: var(--shadow-sm);
        }

        .scan-notification .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .scan-notification .details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .scan-notification .details .title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .scan-notification .student-name {
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 700;
        }

        .scan-notification .student-id {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .scan-notification .time {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            font-variant-numeric: tabular-nums;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            text-align: center;
            gap: 0.75rem;
        }

        .empty-state svg { opacity: 0.35; color: var(--text-muted); }

        .success-anim {
            animation: slideInLeft 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Custom Scrollbar */
        .card-body::-webkit-scrollbar { width: 5px; }
        .card-body::-webkit-scrollbar-track { background: transparent; }
        .card-body::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 20px; }

        /* Responsive */
        @media (max-width: 850px) {
            .dashboard { padding: 1rem; }
            .dash-main { grid-template-columns: 1fr; }
            .dash-main .card { height: auto; max-height: 450px; }
            .counters { gap: 0.5rem; }
            .counter-card { padding: 1rem; }
            .counter-card .counter-value { font-size: 1.75rem; }
            .dash-header { flex-direction: column; gap: 0.75rem; align-items: flex-start; }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard">
        <header class="dash-header">
            <div class="dash-header-left">
                <img src="logoitsmanagement.png" alt="ITS Smart Management" class="dash-logo">
                <div>
                    <h1>Registrazione Ingresso / Uscita</h1>
                    <p class="subtitle">Scansiona il QR Code dello studente per registrare ingresso o uscita</p>
                </div>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                Scanner Attivo
            </div>
        </header>

        <div class="counters">
            <div class="counter-card entrata">
                <div class="counter-value" id="count-entrata">0</div>
                <div class="counter-label">Ingressi</div>
            </div>
            <div class="counter-card uscita">
                <div class="counter-value" id="count-uscita">0</div>
                <div class="counter-label">Uscite</div>
            </div>
            <div class="counter-card totale">
                <div class="counter-value" id="count-totale">0</div>
                <div class="counter-label">Totale</div>
            </div>
        </div>

        <main class="dash-main">
            <section class="card video-section">
                <h2>📷 Inquadra QR Code</h2>
                <div class="card-body">
                    <div class="scanner-container">
                        <div id="reader"></div>
                    </div>
                </div>
            </section>

            <section class="card feedback-section">
                <h2>📝 Registro Attività</h2>
                <div class="card-body">
                    <div id="feedback-area" class="feedback-area">
                        <div class="empty-state" id="empty-state">
                            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <p>In attesa di scansioni...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="api-simulata.js"></script>
    <script>
        const feedbackArea = document.getElementById('feedback-area');
        const emptyState = document.getElementById('empty-state');
        let countEntrata = 0;
        let countUscita = 0;

        async function onScanSuccess(decodedText, decodedResult) {
            const studentId = decodedText;
            if (window.isRecentlyScanned(studentId)) return;
            if (window.markRecentlyScanned) window.markRecentlyScanned(studentId);

            if (emptyState && emptyState.parentNode) {
                emptyState.parentNode.removeChild(emptyState);
            }

            const action = await window.saveScannedStudent(studentId);

            if (action === 'USCITA') countUscita++;
            else countEntrata++;

            document.getElementById('count-entrata').textContent = countEntrata;
            document.getElementById('count-uscita').textContent = countUscita;
            document.getElementById('count-totale').textContent = countEntrata + countUscita;

            addFeedbackNotification(studentId, action);
        }

        function onScanFailure(error) {}

        function getStudentName(email) {
            if (!email) return 'Studente';
            if (!email.includes('@')) return email;
            
            const localPart = email.split('@')[0];
            const nameParts = localPart.split(/[._-]/);
            
            return nameParts
                .map(part => part.charAt(0).toUpperCase() + part.slice(1).toLowerCase())
                .filter(Boolean)
                .join(' ');
        }

        function addFeedbackNotification(studentId, action) {
            const notification = document.createElement('div');
            notification.className = 'scan-notification success-anim';
            
            let timeStr = '';
            const now = new Date();
            if (action === 'USCITA') {
                // Uscita: arrotondamento per eccesso (00:01-00:30 -> 00:30, 00:31-00:59 -> 01:00)
                const currentMinutes = now.getMinutes();
                if (currentMinutes === 0) {
                    const hours = now.getHours().toString().padStart(2, '0');
                    timeStr = `${hours}:00`;
                } else if (currentMinutes <= 30) {
                    const hours = now.getHours().toString().padStart(2, '0');
                    timeStr = `${hours}:30`;
                } else {
                    now.setHours(now.getHours() + 1);
                    const hours = now.getHours().toString().padStart(2, '0');
                    timeStr = `${hours}:00`;
                }
            } else {
                // Ingresso: arrotondamento per difetto (00:00-00:29 -> 00:00, 00:30-00:59 -> 00:30)
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes() < 30 ? '00' : '30';
                timeStr = `${hours}:${minutes}`;
            }

            const fullName = getStudentName(studentId);

            let icon = '✓', title = 'Ingresso registrato';
            let colorStr = 'var(--success)', bgStr = 'rgba(39, 174, 96, 0.08)', borderColor = 'var(--success)';

            if (action === 'USCITA') {
                icon = '👋'; title = 'Uscita registrata';
                colorStr = 'var(--warning)'; bgStr = 'rgba(212, 160, 23, 0.08)'; borderColor = 'var(--warning)';
            } else if (action === 'ERRORE') {
                icon = '❌'; title = 'Errore server';
                colorStr = 'var(--danger)'; bgStr = 'rgba(192, 57, 43, 0.08)'; borderColor = 'var(--danger)';
            }

            notification.style.borderLeftColor = borderColor;
            notification.innerHTML = `
                <div class="icon" style="color: ${colorStr}; background: ${bgStr};">${icon}</div>
                <div class="details">
                    <span class="title" style="color: ${colorStr}">${title}</span>
                    <span class="student-name">${fullName}</span>
                    <span class="student-id">${studentId}</span>
                </div>
                <span class="time">${timeStr}</span>
            `;
            feedbackArea.prepend(notification);
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
